# Lint Markdown docs and check links. Runs only when docs or Markdown change.
# See ci.yml for the Python test/lint workflow.

name: Docs

on:
  push:
    branches: ["main", "master"]
    paths:
      - "docs/**"
      - "**/*.md"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "docs/**"
      - "**/*.md"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (official GitHub action)
        uses: actions/checkout@v4

      - name: Install uv (official Astral action)
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.5"
          enable-cache: true

      # rumdl is the project's Markdown linter (see .claude/rules/documentation.md
      # and .rumdl.toml). uvx fetches and runs it without adding it to the
      # project's dependencies. Lint the docs/ tree and the top-level README as
      # separate invocations — rumdl ignores a directory arg when a file arg is
      # also present on the same command line.
      - name: Lint Markdown with rumdl
        run: |
          uvx rumdl check docs/
          uvx rumdl check README.md

  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (official GitHub action)
        uses: actions/checkout@v4

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--no-progress --verbose docs/**/*.md README.md"
          fail: true
